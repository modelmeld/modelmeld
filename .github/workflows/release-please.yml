# Automated release PRs driven by Conventional Commits.
#
# release-please reads commits on main since the last release tag, generates
# release notes from `feat:` / `fix:` / etc. prefixes per the Conventional
# Commits spec, and opens a PR that bumps the version in pyproject.toml +
# updates CHANGELOG.md. Merging the PR creates a tag, which fires the
# release workflow that builds, signs, and publishes
# the wheel.
#
# Docs: https://github.com/googleapis/release-please
# Conventional Commits: https://www.conventionalcommits.org

name: Release PR

on:
  push:
    branches: [main]
  # Manual re-run for recovery. Useful when release-please's PR was
  # accidentally closed (2026-05-30 incident on 0.3.1) or when main was
  # updated without a commit that triggers release-please (rare).
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        # Pinned to v4.1.3, NOT v5: v5 dropped support for the `signoff:` input
        # below (it silently ignores it), which left the release PR commit
        # without a DCO Signed-off-by trailer and failed the DCO check on the
        # 0.16.1 PR. v4 still honors signoff. Migrating to v5 requires moving
        # the signoff option into a release-please manifest config file
        # (release-please-config.json) — tracked separately. v4 runs on Node 20
        # (deprecated by GitHub 2026-09-16); revisit before then.
        uses: googleapis/release-please-action@db8f2c60ee802b3748b512940dde88eabd7b7e01  # v4.1.3
        with:
          # Use a PAT (or GitHub App token) instead of the default
          # GITHUB_TOKEN. Tag pushes made by GITHUB_TOKEN do NOT fire
          # downstream workflows — a documented GitHub Actions
          # limitation to prevent recursive runs. With the default
          # token, the v0.2.0 tag was created but release.yml never
          # ran and the wheel never published to PyPI (2026-05-30
          # incident).
          #
          # The PAT must have:
          #   - Repository: modelmeld/modelmeld
          #   - Permissions: Contents: read/write,
          #                  Pull requests: read/write
          # Create at: github.com/settings/personal-access-tokens/new
          # Add as secret `RELEASE_PLEASE_TOKEN` in repo settings.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          # Add DCO signoff trailer to the release-please-generated commit.
          # The PAT makes release-please author commits as the token owner
          # (kevinsmith51), so a matching signoff line satisfies the DCO
          # check without requiring a manual amend on every release PR
          # (caught on the 0.3.1 release PR, 2026-05-30).
          signoff: "kevinsmith51 <121474548+kevinsmith51@users.noreply.github.com>"
          release-type: python
          package-name: modelmeld
          # `pyproject.toml` is where release-please writes the version bump.
          extra-files: |
            pyproject.toml
          # release-please understands these commit prefixes; everything else
          # is grouped under "Miscellaneous." Keep the list small and stable.
          changelog-types: |
            [
              {"type":"feat","section":"Features","hidden":false},
              {"type":"fix","section":"Bug Fixes","hidden":false},
              {"type":"perf","section":"Performance","hidden":false},
              {"type":"refactor","section":"Refactors","hidden":false},
              {"type":"docs","section":"Documentation","hidden":false},
              {"type":"chore","section":"Chores","hidden":true},
              {"type":"test","section":"Tests","hidden":true},
              {"type":"ci","section":"CI","hidden":true},
              {"type":"build","section":"Build","hidden":true}
            ]
