# Release workflow — fired by `vX.Y.Z` tag push.
#
# Builds wheel + sdist, signs them with Sigstore, generates a CycloneDX
# SBOM, publishes to PyPI via Trusted Publishing (no long-lived API
# tokens), and uploads everything as a GitHub Release.
#
# Trigger is tag-only (not branch push), so release-please's PR merge
# triggers nothing — only the tag-push from release-please's tagging
# step does. This means a manual `git tag vX.Y.Z && git push --tags`
# also works.
#
# Action pins are commit SHAs per SECURITY.md supply-chain stance:
# a compromised tag pointer on a third-party action can't redirect us.

name: Release

on:
  push:
    tags:
      - "v*"
  # Manual re-run for an existing tag. Useful when the tag-push trigger
  # was missed (e.g., the 2026-05-30 v0.2.0 incident: release-please
  # tagged via GITHUB_TOKEN, which doesn't fire downstream workflows).
  # `skip-existing: true` on the PyPI step (below) makes this idempotent.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.2.0). Must already exist on origin.'
        required: true
        type: string

permissions:
  contents: write       # for creating the GitHub Release
  id-token: write       # for PyPI Trusted Publishing + Sigstore signing
  attestations: write   # for SLSA provenance attestation

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          # Use the dispatched tag if workflow_dispatch, else the
          # pushed tag (github.ref_name). `inputs.tag` is null on
          # tag-push events, so `||` falls through to github.ref_name.
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Extract version from tag
        id: version
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          # Tag is "vX.Y.Z" — strip the "v" prefix
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Building modelmeld ${VERSION}"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build==1.2.2

      - name: Build wheel + sdist
        run: python -m build --wheel --sdist

      - name: Upload build artifacts for later jobs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: modelmeld-dist
          path: dist/
          retention-days: 7

  sbom:
    name: CycloneDX SBOM
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install cyclonedx-py
        run: |
          python -m pip install --upgrade pip
          pip install cyclonedx-bom==4.6.1

      - name: Install package + deps for SBOM scan
        run: pip install .

      - name: Generate CycloneDX SBOM
        run: |
          # cyclonedx-bom 4.x uses `--outfile` (one word), not
          # `--output-file`. Worth a comment because the wrong flag
          # caused the v0.2.0 release pipeline to fail at SBOM step
          # (2026-05-30 incident).
          cyclonedx-py environment \
            --output-format json \
            --outfile modelmeld-${{ needs.build.outputs.version }}-sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom
          path: modelmeld-${{ needs.build.outputs.version }}-sbom.json
          retention-days: 365

  sign-and-publish:
    name: Sign + publish to PyPI
    needs: [build, sbom]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/modelmeld
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          name: modelmeld-dist
          path: dist/

      - name: Download SBOM
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          name: sbom
          # Download SBOM to a separate dir, NOT dist/. The PyPI publish
          # action (gh-action-pypi-publish) rejects any non-distribution
          # file in packages-dir — caused v0.3.0 to fail with
          # "Unknown distribution format" on the SBOM JSON.
          path: release-extras/

      - name: Publish to PyPI (Trusted Publishing)
        # Publish BEFORE Sigstore signing — the sigstore-python action
        # writes .sigstore.json files next to its inputs (into dist/),
        # which then break gh-action-pypi-publish's expectation that
        # dist/ contains only wheels + sdists. Caused v0.3.0 to fail.
        #
        # Bumped from v1.12.3 → v1.14.0 (2026-04-07) so the bundled
        # twine accepts Metadata-Version 2.5 wheels — earlier versions
        # capped at 2.4 and caused the 0.6.2 publish failure when
        # hatchling 1.30 started emitting 2.5. Bundling this with
        # relaxing the hatchling ceiling in pyproject.toml lets us
        # track upstream build tooling again.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          # No api-token needed — uses OIDC token issued by GitHub to
          # the PyPI Trusted Publisher configured for this project.
          packages-dir: dist/
          skip-existing: true

      - name: Sign artifacts with Sigstore
        uses: sigstore/gh-action-sigstore-python@f7ad0af51a5648d09a20d00370f0a91c3bdf8f84  # v3.0.0
        with:
          inputs: |
            ./dist/*.whl
            ./dist/*.tar.gz

      - name: Create GitHub Release with signed artifacts + SBOM
        uses: softprops/action-gh-release@01570a1f39cb168c169c802c3bceb9e93fb10974  # v2.1.0
        with:
          # Explicit tag_name so workflow_dispatch runs work too. On a
          # tag-push trigger, github.ref_name is the tag and `inputs.tag`
          # is null; on workflow_dispatch, github.ref_name is the branch
          # (main) and we need inputs.tag to identify the release.
          # Without this, workflow_dispatch fails with
          # "GitHub Releases requires a tag" (2026-05-30 v0.3.0 incident).
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: "modelmeld v${{ needs.build.outputs.version }}"
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.sigstore
            dist/*.sigstore.json
            release-extras/modelmeld-${{ needs.build.outputs.version }}-sbom.json
          fail_on_unmatched_files: false   # signatures land in dist/ via Sigstore action
