name: security

# Security scanning. Runs on every PR + push to main + weekly schedule.
# The weekly schedule catches CVEs disclosed after a PR merges.
#
# Two jobs:
#   - pip-audit: scans Python deps for known CVEs (OSV database via PyPI)
#   - gitleaks: scans git history for accidentally-committed secrets
#
# Both are blocking — green security required to merge.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly Mon 09:00 UTC
    - cron: '0 9 * * 1'

permissions:
  contents: read

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install pip-audit
        # Upgrade pip first: pip-audit audits the whole environment, so a CVE
        # in the runner's stock pip (e.g. PYSEC-2026-196 in pip 26.1.1) would
        # fail --strict even though it's build tooling, not a project dep.
        # ci.yml and release.yml already do this; keep the three consistent.
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
      - name: Audit
        # --skip-editable skips local-path packages. --strict treats any
        # vuln as a failure; remove if you need to triage MEDIUM/LOW
        # without blocking PRs.
        run: pip-audit --strict --skip-editable

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Fetch full history so secret scanning checks every commit,
          # not just the merge commit. Without this, a secret added then
          # reverted in a single PR would slip through.
          fetch-depth: 0
      # Install the gitleaks binary directly (MIT-licensed, free for all).
      # We deliberately do NOT use gitleaks/gitleaks-action@v2 — that wrapper
      # requires a paid license for org-owned repos as of 2023. The binary
      # is the same scanner; the action just bundles it with a license check.
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/
          gitleaks version
      - name: Run gitleaks
        # Custom config — see .gitleaks.toml at repo root. Allowlists known
        # PII-scrubber test fixtures (synthetic credential shapes like
        # `sk-ant-api03-aaaaaaaa...`). --redact ensures matched secrets
        # never appear in CI logs.
        run: gitleaks detect --source . --config .gitleaks.toml --redact --verbose
