name: Feature request
description: Propose a new capability or a meaningful improvement to existing behavior.
title: "[feature] "
labels: ["enhancement", "needs-triage"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a feature. Before writing this up, consider
        whether it would be more productive to **open a GitHub Discussion
        first** — especially for larger changes (new adapters, new memory
        tiers, framework integrations, anything touching the open-core
        boundary). Discussions let us gauge interest and shape design
        before anyone sinks time into an implementation that may not land.

        See `GOVERNANCE.md` and `CONTRIBUTING.md` for the proposal flow.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: |
        What problem does this feature solve? Lead with the user need,
        not the proposed solution. "I'm trying to X but the gateway does
        Y" is more useful than "please add Z."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: |
        Your suggested approach. Pseudo-code, API sketches, or "I'd add a
        new env var that does X" are all fine. We're after the shape, not
        a finished design.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        Other approaches you thought about and rejected. Helps us avoid
        re-treading ground and surfaces design constraints we might miss.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: How big a change does this look like?
      options:
        - Small (single file, no API change, ships in next release)
        - Medium (multi-file, may need a config option, ships in next minor)
        - Large (architectural, API surface change, needs an RFC)
        - Not sure
    validations:
      required: true

  - type: textarea
    id: use-cases
    attributes:
      label: Use cases
      description: |
        Who needs this? Concrete users / deployments / workloads. Helps us
        weigh against other roadmap items.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else relevant — related issues, prior art in other projects, references.
    validations:
      required: false
